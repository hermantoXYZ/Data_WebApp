services:
  db:
    image: mariadb:10.11.15
    container_name: mariadb_lokal_data
    environment:
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: data_docker
    links:
      - db
    ports:
      - "8080:80" 
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 500M      
      MEMORY_LIMIT: 512M
      MAX_EXECUTION_TIME: 600
    depends_on:
      - db